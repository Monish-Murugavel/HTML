<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
</head>
<body>
<form action="">
    <table border="1" style="background-color: aqua;">
        <tr>
            <th colspan="4" style="color: red; background-color: yellow;"> <h1>Registration Form</h1></th>
        </tr>

        <tr>
            <td colspan="1">Enter Name</td>
            <td colspan="3"><input type="text" name="" id=""></td>
        
        </tr>

        <tr>
            <td>Enter Password</td>
            <td colspan="3"><input type="password" name="" id=""></td>
        </tr>

        <tr colspan="2">
            <td>Enter Address</td>
            <td colspan="3">
                <textarea rows="4" cols="30"></textarea>
            </td>
        </tr>

        <tr>
            <td>Select Game</td>
            <td colspan="3">
                <input type="checkbox" name="Hockey" id=""><label for="">Hockey</label> <br>
                <input type="checkbox" name="Football" id=""><label for="">Football</label> <br>
                <input type="checkbox" name="Badminton"><label for="">Badminton</label> <br>
                <input type="checkbox" name="Cricket" id=""><label for="">Cricket</label> <br>
                <input type="checkbox" name="volleyball" id=""><label for="">volleyball</label>
            </td>
        </tr>

        <tr>
            <td>Gender</td>
            <td colspan="3">
                <input type="radio" name="same" id="">
                <label for="">Male</label>
                <input type="radio" name="same" id="">
                <label for="">Female</label>
            </td>
        </tr>

        <tr>
            <td>Select ur age</td>
            <td colspan="3">
                <select name="" id="">
                <option value="">Select</option>
                <option value="">18-25</option>
                <option value="">25-35</option>
                <option value="">35-50</option>
                <option value="">50+</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Select Photo</td>
            <td colspan="3"> <input type="file" name="" id=""></td>
        </tr>

        <tr>
            <td colspan="4"><input type="button" name="" id="" value="Click me">
            <input type="reset" name="" id="" value="Reset">
            <input type="submit" name="" id="" value="Submit Form">
            </td>
        </tr>

</form>
</table>    
</body>
</html>
