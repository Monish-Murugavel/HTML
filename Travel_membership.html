<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <div style="width: 400px; height: 650px; margin: auto; border: 2px solid black;">
    <div style="margin-left: 30px;">
    <h2>TravelMate Membership form</h2>
    <form action="">
        Full name : <input type="text"> <br>
        <br>
        Email Address : <input type="email"> <br>
        <br>
        DOB : <input type="date"> <br>
        <br>
        Age : <input type="number"> <br>
        <br>
        Phone : <input type="tel" name="" id=""> <br>
        <br>
        Gender : <input type="radio" name="hi" id=""> Male <input type="radio" name="hi" id=""> Female <br>
        <br>

        <div style="display: flex;">
        Preferred Travel Services : <div>
                                     <input type="checkbox"> Flights <br>
                                    <input type="checkbox"> Hotels <br>
                                    <input type="checkbox"> Tour Packages <br>
                                    </div>
        </div>
        <br>
        
        Travel Experience : <input type="range" name="" id=""> <br>
        <br>
        Upload pic : <input type="file" name="" id=""> <br>
        <br>
        <div style="display: flex;">
            <div>
        Choose subsccription : 
        </div>
            <div>
            <input type="radio" name="h12" id=""> Basic Plan <br>
            <input type="radio" name="hi2" id=""> Premium Plan <br>
            </div>
        </div>
        <div style="display: flex;">
        <div>
        Prefered Travel Package : 
        <div>
        <div>
        <input type="checkbox" name="" id=""> Guidded <br>
        <input type="checkbox" name="" id=""> Adventure <br>
        </div>
        <br>

        Comments : <textarea name="" id="" rows="3" style="overflow: scroll;"></textarea>
        <br>

        <div style="margin-left: 50px;">
            <input type="submit" name="" id=""> <input type="reset" name="" id=""> <br>
        </div>
    </form>
    </div>
    </div>
</body>
</html>
